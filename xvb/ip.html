<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="icon" type="image/png" href="assets/icon.jpg">
<title>IP Information • XVB</title>

<style>
:root {
  /* === STESSO SET DEL MANAGER === */
  --bg: #0d1117;
  --card: #161b22;
  --card2: #0d1117;
  --text: #e6edf3;
  --muted: rgba(255, 255, 255, 0.60);
  --muted2: rgba(255, 255, 255, 0.45);
  --accent: #58a6ff;

  --server2: #a971ff;
  --server: #49a6ff;
  --url: #ffb340;
  --local: #63e776;
  --danger: #f85149;

  --radius: 26px;
}

@media (prefers-color-scheme: light) {
  :root {
    --bg: #ffffff;
    --card: #f6f8fa;
    --card2: #ffffff;
    --text: #1f2328;
    --muted: rgba(0, 0, 0, 0.60);
    --muted2: rgba(0, 0, 0, 0.45);
    --accent: #007aff;

    --server2: #8046d9;
    --server: #007aff;
    --url: #ffab01;
    --local: #64c572;
    --danger: #cf222e;
  }
}

* { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
html, body { height: 100%; margin: 0; }

body{
  margin:0;
  min-height:100vh;
  background: var(--bg);
  color:var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  letter-spacing: .1px;
  line-height: 1.5;
  padding:24px;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* container same feeling as manager */
.wrap{
  width: min(1200px, 100%);
  margin: 0 auto;
  padding: 0 18px;
  display:flex;
  flex-direction:column;
  gap:18px;
}

/* top bar = flat card */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;

  padding: 24px;
  background: var(--card);
  border: none;
  border-radius: var(--radius);
  box-shadow: none;
}

/* title style */
h1{
  margin:0;
  font-size: 26px;
  font-weight: 800;
  letter-spacing: -0.02em;
  color: var(--text);
}

.sub{
  margin:6px 0 0;
  font-size: 14px;
  color: var(--muted);
}

.actions{ display:flex; gap:10px; flex-wrap:wrap; }

/* buttons: flat + hover scale/opacity like iconbtn */
.btn{
  appearance:none;
  height: 44px;
  padding: 0 14px;
  border-radius: 16px;
  border: none;
  background: var(--card2);
  color: var(--text);
  font-weight: 800;
  font-size: 13px;
  cursor:pointer;
  transition: opacity 0.2s, transform 0.1s;
}
.btn:hover{ opacity: 0.7; transform: scale(1.03); }
.btn:active{ transform: scale(0.97); }

/* primary = local accent mix (flat) */
.btn.primary{
  background: color-mix(in srgb, var(--local) 18%, var(--card2));
}

/* danger = danger mix (flat) */
.btn.danger{
  background: color-mix(in srgb, var(--danger) 16%, var(--card2));
  color: var(--text);
}

/* grid same as manager */
.grid{
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:18px;
}
@media (max-width: 900px){
  .grid{ grid-template-columns: 1fr; }
}

/* cards = flat sections */
.card{
  background: var(--card);
  border-radius: var(--radius);
  padding: 24px;
  border:none;
  box-shadow:none;
}

/* card header like label + pill */
.card-h{
  padding: 0;
  margin-bottom: 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  border:none;
  background: transparent;
}
.card-h h2{
  margin:0;
  font-size: 14px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: .02em;
  color: var(--muted);
}

/* badge = pill */
.badge{
  font-size: 12px;
  padding: 4px 10px;
  border-radius: 999px;
  border:none;
  background: var(--card2);
  color: var(--muted);
  font-weight: 700;
  white-space: nowrap;
}

.card-b{
  padding: 0;
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* rows = item blocks */
.row{
  display:flex;
  justify-content:space-between;
  gap:12px;
  padding: 16px;
  border-radius: 18px;
  background: var(--card2);
  border:none;
}

.k{
  color: var(--muted);
  font-size: 12px;
  font-weight: 800;
  text-transform: uppercase;
}

.v{
  font-weight: 900;
  font-size: 13px;
  overflow-wrap:anywhere;
  color: var(--text);
  text-align:right;
}

/* raw json box -> same card2 */
pre{
  background: var(--card2);
  padding: 16px;
  border-radius: 18px;
  border: none;
  max-height: 320px;
  overflow:auto;
  font-size: 12px;
  color: var(--text);
}

/* (optional) make pre text a bit softer like muted2 for long blobs */
pre#jsonOutput{ color: var(--text); }
</style>
</head>

<body>
<div class="wrap">

  <div class="top">
    <div>
      <h1>IP Information</h1>
      <p class="sub">Source: ipinfo.io • Last update: <span id="timestamp">—</span></p>
    </div>
    <div class="actions">
      <button class="btn" id="refreshBtn">Refresh</button>
      <button class="btn primary" id="copyIpBtn">Copy IP</button>
      <button class="btn" id="openJsonBtn">Open JSON</button>
      <button class="btn" id="openMapBtn">Open Map</button>
    </div>
  </div>

  <div class="grid">

    <div class="card">
      <div class="card-h">
        <h2>Details</h2>
        <span class="badge" id="statusBadge">Loading…</span>
      </div>
      <div class="card-b">
        <div class="row"><div class="k">IP</div><div class="v" id="ip">—</div></div>
        <div class="row"><div class="k">City</div><div class="v" id="city">—</div></div>
        <div class="row"><div class="k">Region</div><div class="v" id="region">—</div></div>
        <div class="row"><div class="k">Country</div><div class="v" id="country">—</div></div>
        <div class="row"><div class="k">Postal</div><div class="v" id="postal">—</div></div>
        <div class="row"><div class="k">Timezone</div><div class="v" id="timezone">—</div></div>
        <div class="row"><div class="k">ISP / Org</div><div class="v" id="org">—</div></div>
        <div class="row"><div class="k">Coordinates</div><div class="v" id="loc">—</div></div>
      </div>
    </div>

    <div class="card">
      <div class="card-h">
        <h2>Raw JSON</h2>
        <span class="badge" id="jsonBadge">—</span>
      </div>
      <div class="card-b">
        <pre id="jsonOutput">{}</pre>
        <button class="btn danger" id="copyJsonBtn">Copy JSON</button>
      </div>
    </div>

  </div>
</div>

<script>
let currentData = null;

function $(id){ return document.getElementById(id); }

function updateUI(data){
  currentData = data;
  $("timestamp").textContent = new Date().toLocaleString();
  $("statusBadge").textContent = "OK";

  $("ip").textContent = data.ip || "—";
  $("city").textContent = data.city || "—";
  $("region").textContent = data.region || "—";
  $("country").textContent = data.country || "—";
  $("postal").textContent = data.postal || "—";
  $("timezone").textContent = data.timezone || "—";
  $("org").textContent = data.org || "—";
  $("loc").textContent = data.loc || "—";

  $("jsonOutput").textContent = JSON.stringify(data, null, 2);
  $("jsonBadge").textContent = data.ip ? `/${data.ip}/json` : "/json";
}

async function loadIP(){
  $("statusBadge").textContent = "Loading…";
  try{
    const res = await fetch("https://ipinfo.io/json");
    const data = await res.json();
    updateUI(data);
  }catch{
    $("statusBadge").textContent = "Error";
  }
}

$("refreshBtn").onclick = loadIP;

$("copyIpBtn").onclick = () => {
  if(currentData?.ip) navigator.clipboard.writeText(currentData.ip);
};

$("openJsonBtn").onclick = () => {
  window.open(
    currentData?.ip
      ? `https://ipinfo.io/${currentData.ip}/json`
      : "https://ipinfo.io/json",
    "_blank"
  );
};

$("openMapBtn").onclick = () => {
  if(!currentData?.loc) return;
  window.open(`https://www.google.com/maps?q=${currentData.loc}`, "_blank");
};

$("copyJsonBtn").onclick = () => {
  if(currentData) navigator.clipboard.writeText(JSON.stringify(currentData,null,2));
};

loadIP();
</script>
</body>
</html>
